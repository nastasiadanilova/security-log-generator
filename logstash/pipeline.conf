filter {

  # parse nginx access.log
  if [log_type] == "nginx" {

    grok {
      match => {
        "message" => '%{IPORHOST:src_ip} - - \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{NOTSPACE:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code} %{NUMBER:bytes}'
      }
    }

    mutate {
      add_field => { "attack_type" => "unknown" }
      add_field => { "traffic_type" => "normal" }
    }

    # detect sql injection
    if [request] =~ /UNION|SELECT|DROP|INSERT|1=1|OR%20|AND%20/ {
      mutate {
        update => { "attack_type" => "sql_injection" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect directory traversal
    if [request] =~ /\.\.\/|etc%2F|etc\/passwd|etc\/shadow|proc\/self/ {
      mutate {
        update => { "attack_type" => "directory_traversal" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect ddos by status 429
    if [status_code] == "429" {
      mutate {
        update => { "attack_type" => "ddos" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect xss
    if [request] =~ /script|onerror|javascript:|onload|alert\(/ {
      mutate {
        update => { "attack_type" => "xss" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect log4shell
    if [request] =~ /jndi:|ldap:|rmi:|dns:/ {
      mutate {
        update => { "attack_type" => "log4shell" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect credential stuffing (post to login)
    if [method] == "POST" and [request] =~ /login|signin|auth/ {
      mutate {
        update => { "attack_type" => "credential_stuffing" }
        update => { "traffic_type" => "attack" }
      }
    }

    # mark normal successful requests
    if [status_code] == "200" or [status_code] == "301" or [status_code] == "304" {
      mutate { update => { "traffic_type" => "normal" } }
    }

  }

  # parse system logs
  if [log_type] == "system" {

    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host_name} %{DATA:process}: %{GREEDYDATA:log_message}"
      }
    }

    mutate {
      add_field => { "attack_type" => "unknown" }
      add_field => { "traffic_type" => "normal" }
    }

    # detect ssh brute force
    if [log_message] =~ /Failed password|invalid user/ {
      mutate {
        update => { "attack_type" => "ssh_brute_force" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect successful break-in
    if [log_message] =~ /Accepted password/ {
      mutate {
        update => { "attack_type" => "ssh_success" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect normal ssh login
    if [log_message] =~ /Accepted publickey/ {
      mutate {
        update => { "attack_type" => "normal_ssh" }
        update => { "traffic_type" => "normal" }
      }
    }

    # detect syn flood
    if [log_message] =~ /SYN flood|nf_conntrack|UFW BLOCK/ {
      mutate {
        update => { "attack_type" => "syn_flood" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect privilege escalation
    if [log_message] =~ /command not allowed|incorrect password attempts|FAILED su/ {
      mutate {
        update => { "attack_type" => "privilege_escalation" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect reverse shell
    if [log_message] =~ /\/dev\/tcp|bash -i|nc -e|python -c/ {
      mutate {
        update => { "attack_type" => "reverse_shell" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect lateral movement
    if [log_message] =~ /192\.168\.\d+\.\d+.*ssh|ssh.*192\.168/ {
      mutate {
        update => { "attack_type" => "lateral_movement" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect dns amplification
    if [log_message] =~ /named|DNS|query.*denied|too many queries/ {
      mutate {
        update => { "attack_type" => "dns_amplification" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect arp spoofing
    if [log_message] =~ /arp|neighbour.*STALE|moved from.*to|arpwatch/ {
      mutate {
        update => { "attack_type" => "arp_spoofing" }
        update => { "traffic_type" => "attack" }
      }
    }

    # detect ransomware
    if [log_message] =~ /encrypted|locked|crypto|ransom|pay2decrypt/ {
      mutate {
        update => { "attack_type" => "ransomware" }
        update => { "traffic_type" => "attack" }
      }
    }

    # mark normal system events
    if [log_message] =~ /CRON|systemd|session opened|session closed/ {
      mutate { update => { "traffic_type" => "normal" } }
    }

  }

}

output {
  # send to elasticsearch for kibana
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "security-logs-%{+YYYY.MM.dd}"
  }

  # send to graylog via gelf udp
  gelf {
    host => "graylog"
    port => 12201
    sender => "logstash"
    ship_metadata => true
  }
}